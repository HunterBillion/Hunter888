services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainer_pass}
      POSTGRES_DB: ${POSTGRES_DB:-trainer_db}
      TZ: ${TZ:-Europe/Moscow}
      PGTZ: ${TZ:-Europe/Moscow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # FIX: tune PostgreSQL for ~1000 users/day (50-100 concurrent)
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trainer} -d ${POSTGRES_DB:-trainer_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    # FIX: tune Redis for ~1000 users/day — session state + TTS cache + emotion buffers
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret_pass}
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  whisper:
    image: fedirz/faster-whisper-server:0.4.1-cpu  # Pinned — do NOT use :latest in production
    profiles: ["full", "stt"]
    ports:
      - "8001:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small
      WHISPER__LANGUAGE: ru
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

  embeddings:
    build: ./services/embeddings
    profiles: ["full", "embeddings"]
    ports:
      - "8002:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trainer}:${POSTGRES_PASSWORD:-trainer_pass}@postgres:5432/${POSTGRES_DB:-trainer_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_pass}@redis:6379/0
      WHISPER_URL: http://whisper:8000
      EMBEDDINGS_SERVICE_URL: http://embeddings:8001
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      # Persist uploaded avatars across container restarts
      - api_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 45s
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # FIX: 512MB too low for 4 workers + WebSocket sessions + TTS cache
    # Each worker ~100-150MB + in-memory caches
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are baked at build time by Next.js — must be ARGs, not ENV
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      # Keep runtime env for reference (used by standalone server.js hostname binding)
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  api_uploads:
