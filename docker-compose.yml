services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainer_pass}
      POSTGRES_DB: ${POSTGRES_DB:-trainer_db}
      TZ: ${TZ:-Europe/Moscow}
      PGTZ: ${TZ:-Europe/Moscow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # FIX: tune PostgreSQL for ~1000 users/day (50-100 concurrent)
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trainer} -d ${POSTGRES_DB:-trainer_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    # FIX: tune Redis for ~1000 users/day — session state + TTS cache + emotion buffers
    # Journal #88 (class A): maxmemory-policy=volatile-lru — evict only
    # TTL'd entries under memory pressure, preserving security-critical
    # keys without TTL (rate limits, SETNX locks, idempotency, JWT blacklist).
    # NB: comments MUST stay OUTSIDE the `command: >` block — inside a
    # YAML folded scalar, `#` is part of the string, not a comment, and
    # the Redis CLI then fails with "invalid command line string".
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret_pass}
      --maxmemory 384mb
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  whisper:
    image: fedirz/faster-whisper-server:0.6.0-rc.3-cpu  # Pinned — do NOT use :latest in production
    profiles: ["full", "stt"]
    ports:
      - "8001:8000"
    environment:
      WHISPER__MODEL: Systran/faster-whisper-small
      WHISPER__LANGUAGE: ru
    healthcheck:
      # The faster-whisper-server image is python-slim and ships
      # without curl/wget. Probe via the bundled python interpreter.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3) or sys.exit(0)"
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

  embeddings:
    build: ./services/embeddings
    profiles: ["full", "embeddings"]
    ports:
      - "8002:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        RELEASE_SHA: ${RELEASE_SHA:-local}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trainer}:${POSTGRES_PASSWORD:-trainer_pass}@postgres:5432/${POSTGRES_DB:-trainer_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_pass}@redis:6379/0
      WHISPER_URL: http://whisper:8000
      EMBEDDINGS_SERVICE_URL: http://embeddings:8001
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      # Persist uploaded avatars across container restarts
      - api_uploads:/app/uploads
    # P1 fix (2026-04-18): python -c urllib can hang on DNS on some
    # networks; switched to urllib with explicit timeout. Base image is
    # python:3.12-slim so python IS available, but we cap exec at 3s.
    # 2026-05-02 audit (FIND-008): probe ``/api/health/ready`` (deep
    # DB+Redis check, returns HTTP 503 on degraded) instead of
    # ``/api/health`` (now liveness-only — never IO, never 503).
    # Container is "healthy" only after DB pool warms up and Redis
    # answers ping; before that, ``/ready`` returns 503 and Docker
    # holds the container in "starting" state.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/health/ready', timeout=3) or sys.exit(0)"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 45s
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # P1 fix (2026-04-18): 1G → 1.5G (4 workers × ~200MB + TTS/RAG caches
    # + embedding query workloads при 50 DAU). OOM-killer риск при burst
    # в 50+ concurrent training sessions. См. audit FIND-006.
    deploy:
      resources:
        limits:
          memory: 1536M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars are baked at build time by Next.js — must be ARGs, not ENV
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        NEXT_PUBLIC_RELEASE_SHA: ${RELEASE_SHA:-local}
    ports:
      - "3000:3000"
    environment:
      # Keep runtime env for reference (used by standalone server.js hostname binding)
      HOSTNAME: "0.0.0.0"
    # P1 fix (2026-04-18): node:20-alpine имеет wget busybox-applet, но
    # --spider может выдавать ложный non-zero на некоторых версиях. Node
    # есть гарантированно — используем node -e с http.get.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://0.0.0.0:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  api_uploads:
