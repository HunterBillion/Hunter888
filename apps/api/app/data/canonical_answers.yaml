# Canonical answers for ФЗ-127 (банкротство граждан) quiz fallback.
#
# Purpose: when the RAG layer (rag_legal.retrieve_legal_context) returns
# no chunks for a question — sparse coverage is real on this corpus —
# the LLM-judge would otherwise improvise with empty context, producing
# the wrong-feeling verdicts the user reported on 2026-05-04.
#
# This file is the curated last line of defence. Each entry is matched
# against the question text by simple lowercase substring keyword
# detection (see canonical_answers.py). On a hit, the canonical answer
# is fed into the judge as `context_str`, and is also surfaced as the
# `correct_answer_summary` if the LLM verdict ends up "wrong".
#
# CONTENT GUIDELINES (when adding entries):
#   • One short authoritative sentence per `canonical`. No filler.
#   • Always cite the article in `article` (e.g. "ст. 213.4 ФЗ-127").
#   • `q_keywords` are LOWERCASE substrings; entry matches when ALL of
#     them appear in question text (AND, not OR). Pick 2-3 narrow
#     keywords to avoid false matches between similar topics.
#   • Common errors → `wrong_hints` (list of strings). When the user's
#     answer contains any of these substrings, the entry can short-
#     circuit a "wrong" verdict with the targeted explanation.
#
# This file is intended to be edited by methodology / РОП — it is
# plain YAML, no code change needed to update.

version: 1
last_review: "2026-05-04"

categories:
  # ── eligibility: кто и когда может подать заявление ────────────────
  eligibility:
    - q_keywords: ["порог", "обязан", "500"]
      canonical: "Гражданин ОБЯЗАН подать заявление при долге ≥500 000 ₽ и просрочке ≥3 мес."
      article: "ст. 213.4 ФЗ-127"
    - q_keywords: ["мфц", "внесудебн", "диапазон"]
      canonical: "От 25 000 до 1 000 000 ₽ — диапазон долга для внесудебного банкротства через МФЦ. Дополнительно: закрытое исполнительное производство по п. 4 ч. 1 ст. 46 ФЗ-229."
      article: "ст. 223.2 ФЗ-127"
    - q_keywords: ["просрочк", "кредитор", "подать"]
      canonical: "Кредитор вправе подать заявление при долге ≥500 000 ₽ и просрочке ≥3 мес."
      article: "ст. 213.3 ФЗ-127"

  # ── timeline: сроки процедур ───────────────────────────────────────
  timeline:
    - q_keywords: ["реализаци", "имуществ", "длится"]
      canonical: "Процедура реализации имущества — обычно 6 месяцев, может продлеваться судом."
      article: "ст. 213.24 ФЗ-127"
    - q_keywords: ["реструктуризаци", "длит"]
      canonical: "Реструктуризация долгов гражданина — до 3 лет."
      article: "ст. 213.14 ФЗ-127"
    - q_keywords: ["мфц", "длит"]
      canonical: "Внесудебное банкротство через МФЦ длится 6 месяцев."
      article: "ст. 223.4–223.6 ФЗ-127"
    - q_keywords: ["финуправляющ", "назнач"]
      canonical: "Финансовый управляющий назначается судом из СРО, указанной в заявлении должника или кредитора."
      article: "ст. 45, 213.9 ФЗ-127"

  # ── property: что заберут / что не тронут ──────────────────────────
  property:
    - q_keywords: ["единственн", "жил"]
      canonical: "Единственное жильё защищено от реализации (ст. 446 ГПК РФ), КРОМЕ ипотечного — оно реализуется как залог даже если единственное."
      article: "ст. 213.25 ФЗ-127, ст. 446 ГПК РФ"
      wrong_hints: ["заберут единственное", "продадут единственное"]
    - q_keywords: ["холодильник", "стиральн", "техник"]
      canonical: "Бытовая техника не подлежит реализации — это предметы обычной обстановки. Исключение: дорогие предметы роскоши."
      article: "ст. 446 ГПК РФ"
    - q_keywords: ["переписать", "родственник"]
      canonical: "Нет. Управляющий оспорит сделки за 3 года. Также — риск отказа в списании долгов."
      article: "ст. 61.2, ст. 61.3, ст. 213.28 п. 4 ФЗ-127"
    - q_keywords: ["оспаривани", "сделк", "вред"]
      canonical: "Сделки с целью вреда кредиторам оспариваются за 3 года до подачи заявления (ст. 61.2 п. 2). Неравноценные — за 1 год."
      article: "ст. 61.2 ФЗ-127"

  # ── consequences: последствия после процедуры ─────────────────────
  consequences:
    - q_keywords: ["сообщать", "кредит", "лет"]
      canonical: "5 лет после завершения процедуры — обязанность указывать факт банкротства при получении кредитов/займов."
      article: "ст. 213.30 ФЗ-127"
    - q_keywords: ["скрыл", "вклад"]
      canonical: "Откажут в освобождении от обязательств. Банк-вклад — часть конкурсной массы; сокрытие = умышленное действие."
      article: "ст. 213.28 п. 4 абз. 4 ФЗ-127"
    - q_keywords: ["границ", "выехать"]
      canonical: "Можно. После завершения процедуры ограничение на выезд снимается. Во время — суд может ограничить."
      article: "ст. 213.24 ФЗ-127"
    - q_keywords: ["алимент", "списыва"]
      canonical: "Алименты НЕ списываются. Обязанность по их уплате сохраняется после завершения процедуры."
      article: "ст. 213.28 ФЗ-127"

  # ── rights: что нельзя ограничить ──────────────────────────────────
  rights:
    - q_keywords: ["образовани"]
      canonical: "Нет, право на образование сохраняется в полном объёме — банкротство не ограничивает."
      article: "ст. 213.25 ФЗ-127, Конституция РФ ст. 43"
    - q_keywords: ["родительск"]
      canonical: "Нет. Банкротство не основание для лишения родительских прав. Это финансовая процедура, не семейная."
      article: "ст. 213.25, СК РФ ст. 69"
    - q_keywords: ["работодател", "уволить"]
      canonical: "Нет. Банкротство не является основанием для увольнения. Перечень последствий исчерпывающий (ст. 213.30)."
      article: "ст. 213.30 ФЗ-127, ТК РФ"
    - q_keywords: ["прожиточн", "минимум"]
      canonical: "Можно получать больше — при наличии иждивенцев, через ходатайство в суд."
      article: "ст. 213.25 ФЗ-127"

  # ── procedure: как идёт процесс ────────────────────────────────────
  procedure:
    - q_keywords: ["выбирает", "управляющ", "кредитор"]
      canonical: "При подаче кредитором — кредитор предлагает СРО, из которой назначается управляющий. Должник теряет контроль."
      article: "ст. 213.3, ст. 213.5 ФЗ-127"
    - q_keywords: ["реструктуризаци", "пени"]
      canonical: "С момента введения процедуры реструктуризации пени и штрафы перестают начисляться."
      article: "ст. 213.11 ФЗ-127"

  # ── creditors: взаимодействие с кредиторами ────────────────────────
  creditors:
    - q_keywords: ["обща", "кредитор", "должник"]
      canonical: "Только через финансового управляющего. Прямые контакты запрещены."
      article: "ст. 213.11 ФЗ-127, 230-ФЗ ст. 7, КоАП ст. 14.57"

  # ── documents: документы заявления ─────────────────────────────────
  documents:
    - q_keywords: ["список", "кредитор", "обязател"]
      canonical: "Да, список кредиторов обязателен по установленной форме."
      article: "ст. 213.4 ФЗ-127"
    - q_keywords: ["забывчив"]
      canonical: "Нет. Суд различает умышленное сокрытие и добросовестную ошибку. Без умысла долги спишут."
      article: "ст. 213.28 п. 4 ФЗ-127"

  # ── costs: вознаграждения и расходы ────────────────────────────────
  costs:
    - q_keywords: ["вознаграждени", "управляющ", "размер"]
      canonical: "Фиксированное вознаграждение — 25 000 ₽. Плюс 7% от суммы, выплаченной кредиторам."
      article: "ст. 213.9 п. 3 ФЗ-127"

  # ── court: судебная практика ───────────────────────────────────────
  court:
    - q_keywords: ["оспариваются", "сделк", "период"]
      canonical: "За 3 года до подачи заявления — сделки с целью вреда кредиторам (п. 2 ст. 61.2). За 1 год — неравноценные сделки (п. 1 ст. 61.2)."
      article: "ст. 61.2 ФЗ-127"
