  </g>
  <g filter="url(#gSm)">
    <line x1="152" y1="140" x2="360" y2="372" stroke="url(#xLeft)" stroke-width="42" stroke-linecap="round"/>
    <line x1="360" y1="140" x2="152" y2="372" stroke="url(#xRight)" stroke-width="42" stroke-linecap="round"/>
  </g>
  <g opacity="0.6" filter="url(#gMed)">
