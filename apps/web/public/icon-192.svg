    <filter id="gSm"><feGaussianBlur stdDeviation="2" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
