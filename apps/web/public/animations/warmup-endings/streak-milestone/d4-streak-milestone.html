<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>D4 — Streak Milestone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui; color: #fff;
  }
  #display { width: 512px; height: 512px; image-rendering: pixelated; image-rendering: crisp-edges; border: 3px solid #311573; }
  .crt-overlay { position: absolute; top: 0; left: 0; width: 512px; height: 512px; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 4px); }
  .wrap { position: relative; }
  .controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  button { padding: 8px 20px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 9px; }
  button:hover { background: #311573; }
  .info { font-size: 11px; color: #555; font-family: 'Press Start 2P', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="display" width="256" height="256"></canvas>
  <div class="crt-overlay"></div>
</div>
<div class="controls">
  <button onclick="restart()">REPLAY</button>
  <button onclick="togglePause()">PAUSE</button>
  <span class="info" id="ti">0.00s</span>
</div>

<script>
const cv = document.getElementById('display');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;
const S = 256;

// ========== DYNAMIC CONFIG from URL params ==========
// Usage: d4-streak-milestone.html?streak=14&bonus=200
// Or via postMessage: window.postMessage({streak: 30, bonus: 500}, '*')
const params = new URLSearchParams(window.location.search);
const STREAK_NUM = parseInt(params.get('streak') || '7');
const CANDLE_COUNT = Math.min(STREAK_NUM, 10);
const BONUS_XP = parseInt(params.get('bonus') || '100');

window.addEventListener('message', (e) => {
  if (e.data && e.data.streak !== undefined) {
    console.log('Received dynamic data:', e.data);
  }
});

// Colors
const C = {
  bg: '#0a0a14',
  gold: '#FFD700', goldL: '#FFED4A', goldD: '#C8A800',
  orange: '#FF6B35', orangeL: '#FF8855', orangeD: '#CC4411',
  purple: '#311573', purpleL: '#5522AA', purpleD: '#1a0a3a',
  white: '#FFFFFF',
  // Candle
  wax: '#F5E6C8', waxL: '#FFF0D0', waxD: '#D4C4A0', waxS: '#BBA880',
  wick: '#333333',
  flameIn: '#FFED4A', flameMid: '#FFD700', flameOut: '#FF6B35', flameRed: '#FF3300',
  // Glow
  glowGold: '#FFD700',
};

function px(x,y,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,1,1);}
function rect(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,w,h);}
function parseCol(c){
  if(c[0]==='#'){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
  const m=c.match(/(\d+)/g);return[+m[0],+m[1],+m[2]];
}
function toHex(n){const h=Math.round(Math.max(0,Math.min(255,n))).toString(16);return h.length<2?'0'+h:h;}
function lerpColor(a,b,t){
  const pa=parseCol(a),pb=parseCol(b);
  return '#'+toHex(pa[0]+(pb[0]-pa[0])*t)+toHex(pa[1]+(pb[1]-pa[1])*t)+toHex(pa[2]+(pb[2]-pa[2])*t);
}
function drawText(text,x,y,color,size){
  cx.fillStyle=color; cx.font=`${size}px "Press Start 2P",monospace`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(text,x,y);
}

// ========== CANDLE ==========
function drawCandle(x, y, h, flamePhase, brightness) {
  // h = candle height (12-24)
  const w = 8;

  // Candle body
  rect(x - w/2, y - h, w, h, C.wax);
  rect(x - w/2 + 1, y - h, w - 2, h, C.waxL);
  // Left shadow
  rect(x - w/2, y - h, 2, h, C.waxD);
  // Right highlight
  rect(x + w/2 - 2, y - h, 1, h, C.waxL);
  // Bottom
  rect(x - w/2 - 1, y, w + 2, 2, C.waxD);
  // Top rim
  rect(x - w/2, y - h, w, 2, C.waxS);
  rect(x - w/2 + 1, y - h - 1, w - 2, 1, C.waxD);

  // Wick
  rect(x, y - h - 4, 1, 5, C.wick);

  // Flame (4-frame animation)
  const frame = (flamePhase | 0) % 4;
  const fy = y - h - 4;
  const fb = brightness; // 0-1 extra brightness

  // Base flame shape varies per frame
  if (frame === 0) {
    rect(x-1, fy-8, 3, 8, C.flameOut);
    rect(x, fy-7, 1, 6, C.flameMid);
    rect(x, fy-5, 1, 3, C.flameIn);
    px(x, fy-9, C.orangeD);
  } else if (frame === 1) {
    rect(x-1, fy-9, 3, 9, C.flameOut);
    rect(x-1, fy-7, 2, 5, C.flameMid);
    rect(x, fy-6, 1, 3, C.flameIn);
    px(x-1, fy-10, C.orangeD);
  } else if (frame === 2) {
    rect(x-1, fy-7, 3, 7, C.flameOut);
    rect(x, fy-6, 2, 5, C.flameMid);
    rect(x, fy-5, 1, 3, C.flameIn);
    px(x+1, fy-8, C.orangeD);
  } else {
    rect(x-2, fy-8, 4, 8, C.flameOut);
    rect(x-1, fy-7, 3, 6, C.flameMid);
    rect(x, fy-6, 1, 4, C.flameIn);
    px(x+1, fy-9, C.orangeD);
  }

  // Glow around flame
  const glowR = 12 + fb * 20;
  const glowA = 0.08 + fb * 0.15;
  cx.globalAlpha = glowA;
  for (let r = glowR; r > 4; r -= 3) {
    const a = glowA * (1 - r / glowR);
    cx.globalAlpha = a;
    cx.fillStyle = C.glowGold;
    cx.beginPath();
    cx.arc(x, fy - 5, r, 0, Math.PI * 2);
    cx.fill();
  }
  cx.globalAlpha = 1;
}

// ========== NUMBER from pixel bricks ==========
function drawBrickNumber(num, cx2, cy, t, startT) {
  const elapsed = t - startT;
  if (elapsed < 0) return;

  const text = '' + num;
  // Measure text to center it
  cx.font = '32px "Press Start 2P",monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';

  // Draw number as falling bricks effect
  // First pass: render text to figure out where pixels are
  // We'll use a simpler approach: draw the number with a bounce effect

  const bounceT = Math.min(elapsed / 0.6, 1);
  // Elastic bounce
  let bounce;
  if (bounceT < 1) {
    const t2 = bounceT;
    bounce = 1 - Math.pow(1 - t2, 3) * Math.cos(t2 * Math.PI * 2.5);
    bounce = Math.min(bounce, 1);
  } else {
    bounce = 1;
  }

  const dropY = cy - 40 + bounce * 40;
  const alpha = Math.min(elapsed / 0.2, 1);

  cx.globalAlpha = alpha;

  // Shadow
  cx.fillStyle = C.purpleD;
  cx.fillText(text, cx2 + 2, dropY + 2);

  // Main number — gold gradient effect via layering
  cx.fillStyle = C.goldD;
  cx.fillText(text, cx2, dropY + 1);
  cx.fillStyle = C.gold;
  cx.fillText(text, cx2, dropY);
  cx.fillStyle = C.goldL;
  cx.fillText(text, cx2, dropY - 1);

  cx.globalAlpha = 1;
}

// ========== PARTICLES ==========
const particles = [];
function spawnParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 2 - 1,
      life: 1,
      color: [C.gold, C.goldL, C.orange, C.white][Math.random() * 4 | 0],
      size: Math.random() > 0.5 ? 2 : 1,
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= dt * 0.7;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    cx.globalAlpha = p.life * 0.8;
    rect(p.x, p.y, p.size, p.size, p.color);
  }
  cx.globalAlpha = 1;
}

// ========== CANDLE POSITIONS ==========
function getCandlePositions(count) {
  const positions = [];
  const totalW = count * 20;
  const startX = S / 2 - totalW / 2 + 10;
  for (let i = 0; i < count; i++) {
    positions.push({
      x: startX + i * 20,
      y: 170,
      h: 16 + Math.sin(i * 1.3) * 4,
    });
  }
  return positions;
}

// ========== ANIMATION ==========
let startTime = 0, paused = false, pauseTime = 0;
let particlesSpawned = false;

function restart() {
  startTime = performance.now();
  paused = false;
  particles.length = 0;
  particlesSpawned = false;
  requestAnimationFrame(loop);
}
function togglePause() {
  if (paused) { startTime += performance.now() - pauseTime; paused = false; requestAnimationFrame(loop); }
  else { paused = true; pauseTime = performance.now(); }
}
function loop(now) {
  if (paused) return;
  let t = (now - startTime) / 1000;
  if (t > 7) { restart(); return; }
  t = Math.min(t, 5.5);
  document.getElementById('ti').textContent = t.toFixed(2) + 's';
  render(t);
  requestAnimationFrame(loop);
}

function render(t) {
  // Background — dark with subtle purple
  rect(0, 0, S, S, C.bg);

  // Vignette darkness at start
  if (t < 1.0) {
    const fadeIn = t / 1.0;
    cx.globalAlpha = 1 - fadeIn * 0.5;
    rect(0, 0, S, S, '#000000');
    cx.globalAlpha = 1;
  }

  const positions = getCandlePositions(CANDLE_COUNT);

  // Phase 1: [0.0-1.0] Single candle appears
  // Phase 2: [1.0-2.5] Candles multiply with stagger
  // Phase 3: [2.5-3.5] All candles flash bright
  // Phase 4: [3.5-5.0] Number drops in + text

  const flashPhase = t >= 2.5 && t < 3.5;
  const flashBright = flashPhase ? Math.pow(Math.sin((t - 2.5) / 1.0 * Math.PI), 2) : 0;

  // Screen glow during flash
  if (flashBright > 0) {
    cx.globalAlpha = flashBright * 0.15;
    rect(0, 0, S, S, C.gold);
    cx.globalAlpha = 1;
  }

  // Draw candles
  for (let i = 0; i < CANDLE_COUNT; i++) {
    const p = positions[i];

    // Stagger appearance
    let appearT;
    if (i === 0) {
      appearT = 0.3; // first candle appears at 0.3s
    } else {
      appearT = 1.0 + (i - 1) * 0.15; // rest stagger from 1.0s
    }

    if (t < appearT) continue;

    // Pop-in scale
    const popElapsed = t - appearT;
    let scale = 1;
    if (popElapsed < 0.3) {
      const p2 = popElapsed / 0.3;
      scale = p2 < 0.5 ? p2 * 2 * 1.2 : 1.2 - (p2 - 0.5) * 2 * 0.2;
    }

    // Spawn particles when candle appears
    if (popElapsed > 0 && popElapsed < 0.05) {
      spawnParticles(p.x, p.y - p.h - 10, 5);
    }

    // Flame animation phase (each candle offset slightly)
    const flamePhase = t * 6 + i * 1.7;

    // Extra brightness during flash
    const brightness = flashBright;

    // Draw candle with scale
    if (scale < 1) {
      const sh = p.h * scale;
      drawCandle(p.x, p.y, sh, flamePhase, brightness);
    } else {
      drawCandle(p.x, p.y, p.h, flamePhase, brightness);
    }
  }

  // Spawn particles during flash
  if (flashPhase && Math.random() < 0.3) {
    const rp = positions[Math.random() * CANDLE_COUNT | 0];
    if (rp) spawnParticles(rp.x, rp.y - rp.h - 15, 2);
  }

  // Phase 4: Number and text
  if (t >= 3.5) {
    // Bright flash at the moment number appears
    if (t < 3.7) {
      cx.globalAlpha = (1 - (t - 3.5) / 0.2) * 0.3;
      rect(0, 0, S, S, C.white);
      cx.globalAlpha = 1;
    }

    // Spawn big particles on number appear
    if (!particlesSpawned) {
      particlesSpawned = true;
      spawnParticles(S / 2, 80, 30);
    }

    drawBrickNumber(STREAK_NUM, S / 2, 60, t, 3.5);

    // Sub-text
    const tt = t - 3.5;
    if (tt > 0.5) {
      const textA = Math.min((tt - 0.5) / 0.3, 1);
      cx.globalAlpha = textA;
      drawText('ДНЕЙ ПОДРЯД', S / 2, 100, C.orange, 8);
      cx.globalAlpha = 1;
    }
    if (tt > 0.8) {
      const bonusA = Math.min((tt - 0.8) / 0.3, 1);
      cx.globalAlpha = bonusA;

      // Bonus XP badge
      const bx = S / 2, by = 120;
      // Background pill
      cx.globalAlpha = bonusA * 0.6;
      rect(bx - 60, by - 6, 120, 14, C.purpleD);
      rect(bx - 58, by - 5, 116, 12, C.purple);
      cx.globalAlpha = bonusA;
      drawText('+БОНУС ' + BONUS_XP + ' XP', bx, by + 1, C.goldL, 7);
      cx.globalAlpha = 1;
    }

    // Decorative line under text
    if (tt > 1.0) {
      const lineA = Math.min((tt - 1.0) / 0.2, 1);
      cx.globalAlpha = lineA * 0.3;
      const lineW = 80 * lineA;
      rect(S / 2 - lineW / 2, 132, lineW, 1, C.gold);
      cx.globalAlpha = 1;
    }
  }

  // Update particles
  updateParticles(0.016);

  // Floor / platform for candles
  rect(0, 172, S, 2, C.purpleD);
  rect(0, 174, S, S - 174, '#060810');
  // Subtle reflection on floor
  if (t > 0.3) {
    cx.globalAlpha = 0.04 + flashBright * 0.06;
    for (let i = 0; i < CANDLE_COUNT; i++) {
      const p = positions[i];
      const appearT = i === 0 ? 0.3 : 1.0 + (i - 1) * 0.15;
      if (t < appearT) continue;
      rect(p.x - 5, 174, 10, 20, C.gold);
    }
    cx.globalAlpha = 1;
  }

  // Vignette
  const vg = cx.createRadialGradient(S/2, S/2 - 20, S * 0.15, S/2, S/2, S * 0.65);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, S, S);
}

document.fonts.ready.then(() => setTimeout(restart, 200));
</script>
</body>
</html>
