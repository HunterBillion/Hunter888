<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>D5 — Second Chance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui; color: #fff;
  }
  #display { width: 512px; height: 512px; image-rendering: pixelated; image-rendering: crisp-edges; border: 3px solid #1a1a2e; }
  .crt-overlay { position: absolute; top: 0; left: 0; width: 512px; height: 512px; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 4px); }
  .wrap { position: relative; }
  .controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  button { padding: 8px 20px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 9px; }
  button:hover { background: #311573; }
  .info { font-size: 11px; color: #555; font-family: 'Press Start 2P', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="display" width="256" height="256"></canvas>
  <div class="crt-overlay"></div>
</div>
<div class="controls">
  <button onclick="restart()">REPLAY</button>
  <button onclick="togglePause()">PAUSE</button>
  <span class="info" id="ti">0.00s</span>
</div>

<script>
const cv = document.getElementById('display');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;
const S = 256;

// ========== DYNAMIC CONFIG from URL params or defaults ==========
// Usage: d5-second-chance.html?questions=3&date=2026-04-20
// Or via postMessage: window.postMessage({questions: 2, date: '2026-04-20'}, '*')
const params = new URLSearchParams(window.location.search);

const NOW = params.get('date') ? new Date(params.get('date')) : new Date();
const QUESTIONS_RETURNING = parseInt(params.get('questions') || '2');

const TODAY_DAY = NOW.getDate();
const TOMORROW_DAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate() + 1).getDate();

// Get real month info
const YEAR = NOW.getFullYear();
const MONTH = NOW.getMonth(); // 0-indexed
const MONTH_NAMES = ['ЯНВАРЬ','ФЕВРАЛЬ','МАРТ','АПРЕЛЬ','МАЙ','ИЮНЬ',
                     'ИЮЛЬ','АВГУСТ','СЕНТЯБРЬ','ОКТЯБРЬ','НОЯБРЬ','ДЕКАБРЬ'];
const MONTH_NAME = MONTH_NAMES[MONTH];
const DAYS_IN_MONTH = new Date(YEAR, MONTH + 1, 0).getDate();
// Day of week for the 1st of the month (0=Sun, convert to Mon-based: 0=Mon)
const FIRST_DOW_JS = new Date(YEAR, MONTH, 1).getDay(); // 0=Sun
const FIRST_DOW = FIRST_DOW_JS === 0 ? 6 : FIRST_DOW_JS - 1; // 0=Mon, 6=Sun

// Listen for dynamic data via postMessage
window.addEventListener('message', (e) => {
  if (e.data && e.data.questions !== undefined) {
    // Could reload with new params, but for simplicity just note it
    console.log('Received dynamic data:', e.data);
  }
});

const C = {
  bg: '#0a0a14',
  calBg: '#f0eeea', calBgD: '#d8d4cc', calHeader: '#cc3333', calHeaderD: '#aa1111',
  calGrid: '#ccccbb', calText: '#333333', calTextLight: '#999988',
  calWeekend: '#aa6666',
  calToday: '#2A9D8F', calTodayL: '#3dbdad',
  calTomorrow: '#E9C46A', calTomorrowL: '#FFE08A',
  qMark: '#FF6B35', qMarkL: '#FF8855',
  teal: '#2A9D8F', tealL: '#3dbdad', yellow: '#E9C46A',
  white: '#FFFFFF', purple: '#311573',
  arrow: '#E9C46A', arrowL: '#FFE08A',
};

function px(x,y,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,1,1);}
function rect(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,w,h);}
function parseCol(c){
  if(c[0]==='#') return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
  const m=c.match(/(\d+)/g);return[+m[0],+m[1],+m[2]];
}
function toHex(n){const h=Math.round(Math.max(0,Math.min(255,n))).toString(16);return h.length<2?'0'+h:h;}
function lerpColor(a,b,t){
  const pa=parseCol(a),pb=parseCol(b);
  return '#'+toHex(pa[0]+(pb[0]-pa[0])*t)+toHex(pa[1]+(pb[1]-pa[1])*t)+toHex(pa[2]+(pb[2]-pa[2])*t);
}
function drawText(text,x,y,color,size){
  cx.fillStyle=color; cx.font=`${size}px "Press Start 2P",monospace`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(text,x,y);
}
function drawTextLeft(text,x,y,color,size){
  cx.fillStyle=color; cx.font=`${size}px "Press Start 2P",monospace`;
  cx.textAlign='left'; cx.textBaseline='middle'; cx.fillText(text,x,y);
}

// ========== REAL CALENDAR ==========
function drawCalendar(x, y, w, h, flipProgress, showQuestion) {
  // Shadow
  rect(x+3, y+3, w, h, '#050508');

  // Body
  rect(x, y, w, h, C.calBg);
  rect(x+1, y+1, w-2, h-2, C.calBgD);
  rect(x+2, y+2, w-4, h-4, C.calBg);

  // Red header
  const hdrH = 18;
  rect(x, y, w, hdrH, C.calHeader);
  rect(x+1, y+1, w-2, hdrH-2, C.calHeaderD);
  rect(x+1, y+1, w-2, 7, C.calHeader);

  // Month + Year in header
  drawText(MONTH_NAME + ' ' + YEAR, x + w/2, y + hdrH/2, C.white, 5);

  // Spiral holes
  for (let i = 0; i < 5; i++) {
    const hx = x + 14 + i * (w-28)/4;
    rect(hx, y-2, 4, 5, '#777777');
    rect(hx+1, y-1, 2, 3, '#999999');
  }

  // Day-of-week header row
  const padX = 4, padY = hdrH + 4;
  const cellW = (w - padX*2) / 7;
  const cellH = 11;
  const dayLabels = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];

  for (let d = 0; d < 7; d++) {
    const isWeekend = d >= 5;
    drawText(dayLabels[d], x + padX + d*cellW + cellW/2, y + padY + 3, isWeekend ? C.calWeekend : C.calTextLight, 3);
  }

  // Day grid — real month layout
  const gridStartY = y + padY + 10;
  const totalWeeks = Math.ceil((FIRST_DOW + DAYS_IN_MONTH) / 7);

  // Find which row/col today falls on
  let todayRow = -1, todayCol = -1;
  let tomorrowRow = -1, tomorrowCol = -1;

  for (let day = 1; day <= DAYS_IN_MONTH; day++) {
    const idx = FIRST_DOW + day - 1;
    const row = Math.floor(idx / 7);
    const col = idx % 7;

    if (day === TODAY_DAY) { todayRow = row; todayCol = col; }
    if (day === TOMORROW_DAY) { tomorrowRow = row; tomorrowCol = col; }
  }

  // Only show 3-4 rows centered on today's row for readability
  const visibleStartRow = Math.max(0, todayRow - 1);
  const visibleEndRow = Math.min(totalWeeks - 1, visibleStartRow + 3);

  for (let day = 1; day <= DAYS_IN_MONTH; day++) {
    const idx = FIRST_DOW + day - 1;
    const row = Math.floor(idx / 7);
    const col = idx % 7;

    if (row < visibleStartRow || row > visibleEndRow) continue;

    const dispRow = row - visibleStartRow;
    const dx = x + padX + col * cellW + cellW/2;
    const dy = gridStartY + dispRow * cellH + cellH/2;
    const isWeekend = col >= 5;
    const isPast = day < TODAY_DAY;

    // Today highlight — teal rounded rect
    if (day === TODAY_DAY) {
      rect(dx - cellW/2 + 1, dy - cellH/2 + 1, cellW - 2, cellH - 2, C.calToday);
      drawText('' + day, dx, dy, C.white, 4);
    }
    // Tomorrow — appears after flip
    else if (day === TOMORROW_DAY && flipProgress > 0.5) {
      const ta = (flipProgress - 0.5) / 0.5;
      cx.globalAlpha = ta;
      rect(dx - cellW/2 + 1, dy - cellH/2 + 1, cellW - 2, cellH - 2, C.calTomorrow);
      drawText('' + day, dx, dy, '#333', 4);
      cx.globalAlpha = 1;

      // Question mark bubble
      if (showQuestion && flipProgress > 0.7) {
        const qA = Math.min((flipProgress - 0.7) / 0.3, 1);
        cx.globalAlpha = qA;
        const qx = dx + cellW/2 + 1;
        const qy = dy - cellH/2 - 8;
        rect(qx-1, qy, 12, 11, C.qMark);
        rect(qx, qy-1, 10, 9, C.qMarkL);
        drawText('?', qx + 5, qy + 4, C.white, 6);
        // Bubble tail
        px(qx+2, qy+10, C.qMark);
        px(qx+3, qy+11, C.qMark);
        cx.globalAlpha = 1;
      }
    }
    else {
      const color = isPast ? C.calTextLight : isWeekend ? C.calWeekend : C.calText;
      drawText('' + day, dx, dy, color, 4);
    }
  }
}

// ========== PAGE FLIP ==========
function drawPageFlip(x, y, w, h, flipProgress) {
  if (flipProgress <= 0 || flipProgress >= 1) return;
  const foldX = x + w * (1 - flipProgress);
  const pageW = w * flipProgress;
  if (pageW < 2) return;
  // Shadow at fold
  cx.globalAlpha = 0.2 * (1 - Math.abs(flipProgress - 0.5) * 2);
  rect(foldX - 4, y, 8, h, '#000');
  cx.globalAlpha = 1;
  // Page
  cx.globalAlpha = 0.9;
  rect(foldX, y, Math.min(pageW, w - (foldX - x)), h, '#f8f6f0');
  rect(foldX, y, 2, h, '#fff');
  rect(foldX + 2, y, 1, h, '#e8e4dc');
  cx.globalAlpha = 1;
}

// ========== TICKING ARROW ==========
function drawTickArrow(x, y, t) {
  const offset = Math.sin(t * 4) > 0 ? 2 : 0;
  const ax = x + offset;
  rect(ax, y, 12, 3, C.arrow);
  rect(ax, y+1, 12, 1, C.arrowL);
  rect(ax+10, y-2, 3, 2, C.arrow);
  rect(ax+12, y-1, 3, 2, C.arrow);
  rect(ax+14, y, 3, 3, C.arrow);
  rect(ax+12, y+2, 3, 2, C.arrow);
  rect(ax+10, y+3, 3, 2, C.arrow);
  rect(ax+14, y+1, 3, 1, C.arrowL);
}

// ========== ANIMATION ==========
let startTime = 0, paused = false, pauseTime = 0;
function restart() { startTime = performance.now(); paused = false; requestAnimationFrame(loop); }
function togglePause() {
  if (paused) { startTime += performance.now() - pauseTime; paused = false; requestAnimationFrame(loop); }
  else { paused = true; pauseTime = performance.now(); }
}
function loop(now) {
  if (paused) return;
  let t = (now - startTime) / 1000;
  if (t > 7) { restart(); return; }
  t = Math.min(t, 5.5);
  document.getElementById('ti').textContent = t.toFixed(2) + 's';
  render(t);
  requestAnimationFrame(loop);
}

function render(t) {
  rect(0, 0, S, S, C.bg);

  const calW = 130, calH = 90;
  const calX = S/2 - calW/2, calY = 22;

  // Fade in
  cx.globalAlpha = t < 0.3 ? t / 0.3 : 1;

  // Flip: 1.5 → 2.8
  const flipP = t < 1.5 ? 0 : Math.min((t - 1.5) / 1.3, 1);
  const flipEased = flipP < 0.5 ? 2*flipP*flipP : 1 - Math.pow(-2*flipP+2, 2)/2;

  drawCalendar(calX, calY, calW, calH, flipEased, true);
  if (flipP > 0 && flipP < 1) drawPageFlip(calX, calY, calW, calH, flipEased);

  cx.globalAlpha = 1;

  // Arrow during flip
  if (t >= 1.8 && t < 3.0) {
    cx.globalAlpha = Math.min((t - 1.8) / 0.3, 1);
    drawTickArrow(calX + calW + 6, calY + calH/2 - 1, t);
    cx.globalAlpha = 1;
  }

  // ========== TEXT PANEL ==========
  if (t >= 3.0) {
    const tt = t - 3.0;
    const pX = 10, pY = 130, pW = 236, pH = 118;
    const pa = Math.min(tt / 0.25, 1);

    cx.globalAlpha = pa * 0.92;
    rect(pX+3, pY+2, pW-6, pH-4, '#0a0a14');
    rect(pX+2, pY+3, pW-4, pH-6, '#0a0a14');

    cx.globalAlpha = pa * 0.75;
    rect(pX+4, pY, pW-8, 2, C.teal);
    rect(pX+4, pY+pH-2, pW-8, 2, C.teal);
    rect(pX, pY+4, 2, pH-8, C.teal);
    rect(pX+pW-2, pY+4, 2, pH-8, C.teal);
    rect(pX+2,pY+2,2,2,C.teal); rect(pX+pW-4,pY+2,2,2,C.teal);
    rect(pX+2,pY+pH-4,2,2,C.teal); rect(pX+pW-4,pY+pH-4,2,2,C.teal);

    cx.globalAlpha = pa;
    const pcx = pX + pW/2;

    drawText('ЗАВТРА ВЕРНЁТСЯ', pcx, pY + 18, C.teal, 8);

    if (tt > 0.2) {
      cx.globalAlpha = Math.min((tt - 0.2) / 0.2, 1);
      cx.globalAlpha *= 0.2;
      drawText('' + QUESTIONS_RETURNING, pcx, pY + 44, C.yellow, 24);
      cx.globalAlpha = Math.min((tt - 0.2) / 0.2, 1);
      drawText('' + QUESTIONS_RETURNING, pcx, pY + 44, C.yellow, 20);
    }

    if (tt > 0.4) {
      cx.globalAlpha = Math.min((tt - 0.4) / 0.2, 1);
      const n = QUESTIONS_RETURNING;
      const word = n === 1 ? 'ВОПРОС' : n < 5 ? 'ВОПРОСА' : 'ВОПРОСОВ';
      drawText(word, pcx, pY + 62, C.tealL, 7);
    }

    if (tt > 0.5) {
      cx.globalAlpha = Math.min((tt - 0.5) / 0.1, 1) * 0.4;
      rect(pX+30, pY+72, pW-60, 1, C.teal);
    }

    if (tt > 0.6) {
      cx.globalAlpha = Math.min((tt - 0.6) / 0.3, 1) * 0.7;
      drawText('ТЕ, ЧТО БЫЛИ', pcx, pY + 84, C.tealL, 6);
      drawText('СЛОЖНЫМИ', pcx, pY + 96, C.tealL, 6);
    }

    cx.globalAlpha = 1;

    if (tt > 0.8) {
      cx.globalAlpha = Math.min((tt - 0.8) / 0.2, 1) * 0.6;
      drawTickArrow(pX + pW - 30, pY + 40, t);
      cx.globalAlpha = 1;
    }
  }

  // Vignette
  const vg = cx.createRadialGradient(S/2, S/2-10, S*0.2, S/2, S/2, S*0.65);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, S, S);
}

document.fonts.ready.then(() => setTimeout(restart, 200));
</script>
</body>
</html>
