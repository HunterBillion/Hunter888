<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>D3 — Ты не выспался?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: system-ui; color: #fff;
  }
  #display { width: 512px; height: 512px; image-rendering: pixelated; image-rendering: crisp-edges; border: 3px solid #1a1a2e; }
  .crt-overlay { position: absolute; top: 0; left: 0; width: 512px; height: 512px; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 4px); }
  .wrap { position: relative; }
  .controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  button { padding: 8px 20px; border-radius: 6px; border: 1px solid #333; background: #1a1a2e; color: #fff; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 9px; }
  button:hover { background: #311573; }
  .info { font-size: 11px; color: #555; font-family: 'Press Start 2P', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="display" width="256" height="256"></canvas>
  <div class="crt-overlay"></div>
</div>
<div class="controls">
  <button onclick="restart()">REPLAY</button>
  <button onclick="togglePause()">PAUSE</button>
  <span class="info" id="ti">0.00s</span>
</div>

<script>
const cv = document.getElementById('display');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;
const S = 256;

const C = {
  bg: '#0a0a14',
  wall: '#1a1a2e', wallL: '#222244', wallD: '#121228',
  floor: '#151530', floorL: '#1e1e40',
  // Bed
  bedFrame: '#5a3a1a', bedFrameL: '#7a5a30', bedFrameD: '#3a2210',
  pillow: '#ccccdd', pillowS: '#aaaabc',
  blanket: '#2a4a8a', blanketL: '#3a5a9e', blanketD: '#1a3060',
  blanketFold: '#4a6ab0',
  // Skin/character
  skin: '#e8b87a', skinS: '#c4935a', hair: '#1a1a2e',
  eyeClose: '#c4935a', eyeW: '#ffffff',
  // Nightstand
  stand: '#4a3218', standL: '#6a4a28',
  // Phone
  phone: '#888888', phoneL: '#aaaaaa', phoneD: '#555555', phoneRing: '#22c55e',
  // ZZZ
  zzz: '#6688cc',
  // Window sky
  nightSky: '#0a0e2a', dawnSky1: '#1a2050', dawnSky2: '#3a3070', dawnWarm: '#E76F51', dawnGold: '#F4A261',
  // Panel
  teal: '#2A9D8F', tealL: '#3dbdad', yellow: '#E9C46A',
  white: '#ffffff',
};

function px(x,y,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,1,1);}
function rect(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(x|0,y|0,w,h);}
function parseCol(c){
  if(c[0]==='#'){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
  const m=c.match(/(\d+)/g);return[+m[0],+m[1],+m[2]];
}
function toHex(n){const h=Math.round(Math.max(0,Math.min(255,n))).toString(16);return h.length<2?'0'+h:h;}
function lerpColor(a,b,t){
  const pa=parseCol(a),pb=parseCol(b);
  return '#'+toHex(pa[0]+(pb[0]-pa[0])*t)+toHex(pa[1]+(pb[1]-pa[1])*t)+toHex(pa[2]+(pb[2]-pa[2])*t);
}
function drawText(text,x,y,color,size){
  cx.fillStyle=color; cx.font=`${size}px "Press Start 2P",monospace`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(text,x,y);
}

// ========== ROOM ==========
function drawRoom(dawnProgress) {
  // Wall
  rect(0, 0, S, 140, C.wall);
  for (let y = 0; y < 140; y += 16) rect(0, y, S, 1, C.wallL);
  rect(0, 138, S, 4, C.wallD);
  // Floor
  rect(0, 142, S, S-142, C.floor);
  for (let x = 0; x < S; x += 32) rect(x, 142, 1, S-142, C.floorL);

  // === WINDOW with realistic dawn ===
  const winX=170, winY=28, winW=58, winH=64;
  const fw = 4; // frame width

  // STEP 1: Draw wooden frame FIRST (as background)
  rect(winX-fw-2, winY-fw-2, winW+fw*2+4, winH+fw*2+4, '#1a1220'); // outer shadow
  rect(winX-fw, winY-fw, winW+fw*2, winH+fw*2, '#4a3828');           // main wood
  rect(winX-fw+1, winY-fw+1, winW+fw*2-2, winH+fw*2-2, '#5a4838'); // lighter wood

  // Window sill (extends wider)
  rect(winX-fw-4, winY+winH+fw, winW+fw*2+8, 6, '#4a3828');
  rect(winX-fw-3, winY+winH+fw, winW+fw*2+6, 4, '#5a4838');
  rect(winX-fw-3, winY+winH+fw, winW+fw*2+6, 2, '#6a5848');

  // STEP 2: Draw sky ON TOP of frame (fills the inner window hole)
  // Clean color palette — no muddy browns!
  // Uses 3-stop gradient: top color, middle color, horizon color
  // Each phase blends smoothly into next
  const dp = dawnProgress;
  let skyTop, skyMid, skyBot;

  if (dp < 0.2) {
    // NIGHT — almost black, uniform darkness
    skyTop = '#040608'; skyMid = '#050810'; skyBot = '#060a14';
  } else if (dp < 0.4) {
    // LATE NIGHT → PRE-DAWN — deep navy appears at horizon
    const p = (dp - 0.2) / 0.2;
    skyTop = lerpColor('#040608', '#060a18', p);
    skyMid = lerpColor('#050810', '#0a1028', p);
    skyBot = lerpColor('#060a14', '#121840', p);
  } else if (dp < 0.6) {
    // PRE-DAWN — violet/indigo glow at horizon, deep blue above
    const p = (dp - 0.4) / 0.2;
    skyTop = lerpColor('#060a18', '#0c1430', p);
    skyMid = lerpColor('#0a1028', '#182050', p);
    skyBot = lerpColor('#121840', '#382868', p);  // clean violet
  } else if (dp < 0.75) {
    // DAWN — rose pink at horizon, violet-blue above
    const p = (dp - 0.6) / 0.15;
    skyTop = lerpColor('#0c1430', '#152048', p);
    skyMid = lerpColor('#182050', '#2a3070', p);
    skyBot = lerpColor('#382868', '#e06888', p);  // clean rose pink!
  } else if (dp < 0.9) {
    // SUNRISE — warm orange at horizon, lightening blue sky
    const p = (dp - 0.75) / 0.15;
    skyTop = lerpColor('#152048', '#2a4878', p);
    skyMid = lerpColor('#2a3070', '#4060a0', p);
    skyBot = lerpColor('#e06888', '#f0a040', p);  // rose → warm gold
  } else {
    // FULL SUNRISE — bright golden horizon, blue sky
    const p = (dp - 0.9) / 0.1;
    skyTop = lerpColor('#2a4878', '#4080bb', p);
    skyMid = lerpColor('#4060a0', '#6090cc', p);
    skyBot = lerpColor('#f0a040', '#ffbb44', p);
  }

  for (let y = 0; y < winH; y++) {
    const yR = y / winH;
    let color;
    if (yR < 0.5) {
      // Top half: skyTop → skyMid
      color = lerpColor(skyTop, skyMid, yR * 2);
    } else {
      // Bottom half: skyMid → skyBot
      color = lerpColor(skyMid, skyBot, (yR - 0.5) * 2);
    }
    rect(winX, winY + y, winW, 1, color);
  }

  // Sun disc appearing at horizon (only during actual sunrise)
  if (dp > 0.8) {
    const sunA = Math.min((dp - 0.8) / 0.2, 1);
    cx.globalAlpha = sunA * 0.6;
    const sunCY = winY + winH - 4 - sunA * 10;
    // Sun glow (soft)
    rect(winX + winW/2 - 9, sunCY + 1, 18, 6, '#ff9944');
    cx.globalAlpha = sunA * 0.8;
    // Sun body
    rect(winX + winW/2 - 5, sunCY, 10, 6, '#ffcc44');
    rect(winX + winW/2 - 3, sunCY - 2, 6, 2, '#ffdd66');
    rect(winX + winW/2 - 6, sunCY + 2, 12, 3, '#ffbb33');
    cx.globalAlpha = 1;
  }

  // Stars (deep night only, fade early)
  if (dp < 0.3) {
    cx.globalAlpha = (1 - dp / 0.3) * 0.9;
    px(winX+6, winY+6, '#8899cc'); px(winX+30, winY+5, '#99aadd');
    px(winX+18, winY+14, '#7788bb'); px(winX+44, winY+18, '#8899cc');
    px(winX+10, winY+26, '#7788bb'); px(winX+38, winY+10, '#99aadd');
    px(winX+50, winY+30, '#7788bb'); px(winX+24, winY+38, '#8899cc');
    cx.globalAlpha = 1;
  }

  // STEP 3: Cross bars ON TOP of sky
  rect(winX + winW/2 - 1, winY, 3, winH, '#5a4838');
  rect(winX + winW/2, winY, 1, winH, '#6a5848');
  rect(winX, winY + winH/2 - 1, winW, 3, '#5a4838');
  rect(winX, winY + winH/2, winW, 1, '#6a5848');

  // Dawn light spilling into room (only during actual sunrise)
  if (dawnProgress > 0.8) {
    const lightA = (dawnProgress - 0.8) / 0.2 * 0.12;
    cx.globalAlpha = lightA;
    rect(winX-30, winY+winH+10, winW+60, 50, '#F0A030');
    rect(winX-10, winY+winH+4, winW+20, 30, '#F0A030');
    cx.globalAlpha = 1;
  }

  // Meadow painting on wall
  // Frame (golden wood)
  rect(24, 34, 36, 40, '#5a4020');
  rect(25, 35, 34, 38, '#7a5a30');
  rect(26, 36, 32, 36, '#5a4020');
  // Canvas inside
  rect(28, 38, 28, 32, '#4488cc'); // sky
  // Sky gradient (top lighter blue to horizon)
  rect(28, 38, 28, 8, '#5599dd');
  rect(28, 46, 28, 6, '#66aaee');
  // White clouds
  rect(31, 40, 6, 3, '#ddeeff');
  rect(30, 41, 8, 2, '#ccddef');
  rect(42, 39, 5, 2, '#ddeeff');
  rect(41, 40, 7, 2, '#ccddef');
  // Hills (rolling green)
  rect(28, 52, 28, 4, '#55aa44');
  rect(28, 54, 28, 2, '#449933');
  rect(32, 51, 12, 2, '#66bb55'); // hill bump
  rect(28, 50, 8, 3, '#55aa44');  // left hill
  rect(44, 51, 12, 2, '#55aa44'); // right hill
  // Grass / meadow base
  rect(28, 56, 28, 14, '#338822');
  rect(28, 56, 28, 4, '#44aa33');
  // Flowers on meadow (tiny colorful dots)
  px(30, 58, '#ff6688'); px(34, 60, '#ffaa44'); px(38, 57, '#ff4466');
  px(42, 59, '#ffcc33'); px(46, 58, '#ff6688'); px(50, 60, '#aa66ff');
  px(32, 62, '#ffcc33'); px(40, 63, '#ff6688'); px(48, 62, '#ffaa44');
  px(36, 65, '#aa66ff'); px(44, 66, '#ff4466'); px(52, 64, '#ffcc33');
  // Sun in painting (small golden circle)
  rect(49, 39, 4, 4, '#ffdd44');
  rect(48, 40, 6, 2, '#ffdd44');
  rect(50, 38, 2, 6, '#ffdd44');
  // Rug on floor
  rect(60, 148, 80, 8, '#2a1a3a');
  rect(62, 150, 76, 4, '#3a2a4a');
}

// ========== BED ==========
function drawBed(x, y) {
  // Headboard (tall, clearly a bed headboard)
  rect(x-2, y-8, 10, 42, C.bedFrameD);
  rect(x-1, y-8, 8, 40, C.bedFrame);
  rect(x, y-6, 6, 36, C.bedFrameL);
  // Headboard top decorative bar
  rect(x-3, y-10, 12, 4, C.bedFrameL);
  rect(x-2, y-9, 10, 2, C.bedFrame);
  // Footboard (shorter)
  rect(x+84, y+4, 8, 28, C.bedFrameD);
  rect(x+85, y+4, 6, 26, C.bedFrame);
  rect(x+84, y+2, 10, 4, C.bedFrameL);
  // Mattress (white, clearly a mattress)
  rect(x+8, y+2, 76, 26, '#e8e8f0');
  rect(x+8, y+4, 76, 22, '#dddde8');
  rect(x+8, y+2, 76, 2, '#f0f0f8'); // mattress top highlight
  // Pillow (fluffy, clear shape)
  rect(x+10, y+4, 24, 14, C.pillow);
  rect(x+11, y+5, 22, 12, C.pillowS);
  rect(x+12, y+6, 20, 3, C.pillow); // highlight puff
  rect(x+12, y+14, 20, 2, '#bbbbcc'); // shadow under pillow
  // Second pillow hint (layered)
  rect(x+10, y+6, 24, 2, '#bbbbc8');
  // Legs
  rect(x+4, y+30, 4, 8, C.bedFrameD);
  rect(x+86, y+30, 4, 8, C.bedFrameD);
  rect(x+5, y+30, 2, 8, C.bedFrame);
  rect(x+87, y+30, 2, 8, C.bedFrame);
  // Side rail
  rect(x+8, y+26, 78, 4, C.bedFrame);
  rect(x+8, y+26, 78, 2, C.bedFrameL);
}

// ========== BLANKET (animated — slides off to the side) ==========
function drawBlanket(x, y, slideOff) {
  // slideOff: 0 = fully covering body, 1 = thrown off to the side
  // Blanket covers from neck area to beyond feet
  const coverStart = x + 28; // starts after pillow/head area
  const coverFullW = 58;     // full width when covering

  // As slideOff increases, blanket shifts right and bunches up
  const bx = coverStart + slideOff * 46;
  const bw = Math.max(0, coverFullW - slideOff * 36);
  if (bw <= 0) return;

  // Main blanket body — thick and puffy
  rect(bx, y+2, bw, 24, C.blanket);
  rect(bx+1, y+4, bw-2, 20, C.blanketD);
  // Top surface (puffy bump — shows body shape underneath)
  rect(bx, y+2, bw, 4, C.blanketL);
  rect(bx, y+2, bw, 2, C.blanketFold);
  // Body bump under blanket (subtle shape)
  if (slideOff < 0.4) {
    cx.globalAlpha = 0.25;
    rect(bx+6, y+1, Math.min(bw-12, 30), 2, C.blanketL);  // chest bump
    rect(bx+14, y, Math.min(bw-20, 18), 2, C.blanketFold); // higher bump at torso
    cx.globalAlpha = 1;
  }

  // Fold/edge at top where blanket meets neck
  rect(bx, y+4, 3, 18, C.blanketFold);

  // Hanging edge off bed side
  if (slideOff < 0.6) {
    const hangW = Math.min(bw, 14);
    const hangH = 6 + slideOff * 8;
    rect(bx + bw - hangW, y+26, hangW, hangH, C.blanket);
    rect(bx + bw - hangW, y+26, hangW, 2, C.blanketL);
    rect(bx + bw - hangW + 2, y+28, hangW-4, hangH-4, C.blanketD);
  }

  // Bunched up blanket when thrown off
  if (slideOff > 0.5) {
    const bunchA = (slideOff - 0.5) / 0.5;
    cx.globalAlpha = bunchA;
    rect(bx + bw - 6, y+2, 10, 26, C.blanket);
    rect(bx + bw - 4, y+4, 8, 22, C.blanketL);
    rect(bx + bw, y+6, 6, 18, C.blanketFold);
    cx.globalAlpha = 1;
  }

  // Wrinkle/fold details
  if (bw > 15) {
    cx.globalAlpha = 0.35;
    rect(bx + 8, y+8, 1, 12, C.blanketL);
    rect(bx + 18, y+10, 1, 10, C.blanketL);
    if (bw > 30) rect(bx + 30, y+9, 1, 11, C.blanketL);
    if (bw > 42) rect(bx + 42, y+10, 1, 10, C.blanketL);
    cx.globalAlpha = 1;
  }
}

// ========== HEAD ON PILLOW (sleeping) ==========
function drawSleepingHead(x, y, breathe) {
  const hx = x + 12, hy = y + 1 + breathe;
  // Hair (messy, sleeping)
  rect(hx-1, hy, 16, 4, C.hair);
  rect(hx-2, hy+2, 18, 2, C.hair);
  rect(hx+13, hy-1, 3, 3, C.hair); // sticking up hair
  // Face (side view, lying on pillow)
  rect(hx, hy+4, 14, 10, C.skin);
  rect(hx+1, hy+5, 12, 8, C.skin);
  // Cheek blush (sleeping warm)
  cx.globalAlpha = 0.2;
  rect(hx+2, hy+9, 4, 2, '#ff8888');
  rect(hx+10, hy+9, 4, 2, '#ff8888');
  cx.globalAlpha = 1;
  // Closed eyes (peaceful, curved lines)
  rect(hx+2, hy+7, 4, 1, C.eyeClose);
  rect(hx+3, hy+8, 2, 1, C.eyeClose); // curve down
  rect(hx+9, hy+7, 4, 1, C.eyeClose);
  rect(hx+10, hy+8, 2, 1, C.eyeClose);
  // Peaceful mouth
  rect(hx+5, hy+11, 4, 1, C.skinS);
  // Neck/shoulder peeking from blanket
  rect(hx+4, hy+14, 10, 4, C.skin);
  // Pajama collar visible
  rect(hx+2, hy+16, 14, 3, C.blanketD);
  rect(hx+3, hy+16, 12, 2, C.blanket);
}

// ========== HEAD AWAKE (startled, sitting up, pushes blanket off) ==========
function drawAwakeHead(x, y, sitUpProgress) {
  // Moves from lying to sitting up
  const hx = x + 12 + sitUpProgress * 8;
  const hy = y - sitUpProgress * 16;

  // Hair (messy from sleep)
  rect(hx-1, hy, 16, 4, C.hair);
  rect(hx-2, hy+2, 18, 2, C.hair);
  rect(hx+13, hy-1, 3, 3, C.hair); // sticking up
  rect(hx-2, hy+1, 2, 3, C.hair); // messy side
  // Face
  rect(hx, hy+4, 14, 12, C.skin);
  rect(hx+1, hy+5, 12, 10, C.skin);
  // BIG eyes (startled!)
  rect(hx+2, hy+7, 5, 4, C.eyeW);
  rect(hx+3, hy+8, 3, 2, '#333');  // pupil
  rect(hx+1, hy+7, 1, 1, C.eyeW);  // wide open corner
  rect(hx+9, hy+7, 5, 4, C.eyeW);
  rect(hx+10, hy+8, 3, 2, '#333');
  rect(hx+14, hy+7, 1, 1, C.eyeW);
  // Eyebrows raised
  rect(hx+2, hy+5, 5, 1, C.hair);
  rect(hx+9, hy+5, 5, 1, C.hair);
  // Open mouth (surprised)
  rect(hx+5, hy+13, 5, 3, C.skinS);
  rect(hx+6, hy+13, 3, 3, '#8a5a3a');

  // Body appears as sits up
  if (sitUpProgress > 0.2) {
    const bodyA = Math.min((sitUpProgress - 0.2) / 0.5, 1);
    cx.globalAlpha = bodyA;
    // Pajama top
    rect(hx-4, hy+16, 22, 10, C.blanketD);
    rect(hx-2, hy+16, 18, 8, C.blanket);
    // Collar detail
    rect(hx+4, hy+16, 6, 2, C.skin);
    // Left arm (pushing blanket off!)
    const armAngle = sitUpProgress * 0.8;
    rect(hx+18, hy+18 + armAngle*4, 6, 4, C.skin);
    rect(hx+22, hy+20 + armAngle*6, 4, 3, C.skin); // hand pushing
    // Right arm
    rect(hx-8, hy+18, 6, 4, C.skin);
    cx.globalAlpha = 1;
  }
}

// ========== PHONE ON NIGHTSTAND ==========
function drawNightstand(x, y) {
  rect(x, y, 20, 18, C.stand);
  rect(x+1, y+1, 18, 16, C.standL);
  rect(x+1, y, 18, 2, C.bedFrameL);
  // Drawer knob
  px(x+10, y+10, C.bedFrameL);
  // Legs
  rect(x+2, y+18, 3, 4, C.stand);
  rect(x+15, y+18, 3, 4, C.stand);
}

function drawPhone(x, y, ringing, t) {
  const shake = ringing ? Math.sin(t * 30) * 2 : 0;
  const sx = (x + shake)|0;
  rect(sx, y, 14, 20, C.phone);
  rect(sx+1, y+1, 12, 18, C.phoneD);
  rect(sx+2, y+2, 10, 10, ringing ? C.phoneRing : '#333344');
  rect(sx+5, y+14, 4, 2, C.phoneL);

  if (ringing) {
    // Ring waves both sides
    const wa = Math.abs(Math.sin(t * 14));
    cx.globalAlpha = wa * 0.7;
    // Left arcs
    px(sx-3, y+4, C.phoneRing); px(sx-4, y+6, C.phoneRing);
    px(sx-3, y+8, C.phoneRing); px(sx-5, y+6, C.phoneRing);
    // Right arcs
    px(sx+16, y+4, C.phoneRing); px(sx+17, y+6, C.phoneRing);
    px(sx+16, y+8, C.phoneRing); px(sx+18, y+6, C.phoneRing);
    cx.globalAlpha = 1;

    // Screen flash
    const flash = Math.sin(t * 16) > 0;
    if (flash) {
      cx.globalAlpha = 0.2;
      rect(sx-2, y-2, 18, 24, C.phoneRing);
      cx.globalAlpha = 1;
    }
  }
}

// ========== ZZZ ==========
function drawZzz(x, y, t) {
  for (let i = 0; i < 3; i++) {
    const phase = ((t - i*0.6) % 2.4) / 2.4;
    if (phase < 0 || phase > 0.8) continue;
    const alpha = phase < 0.2 ? phase/0.2 : phase > 0.6 ? (0.8-phase)/0.2 : 1;
    const fy = y - phase * 24 - i * 8;
    const fx = x + i * 10 + Math.sin(phase * 4) * 3;
    cx.globalAlpha = alpha * 0.7;
    drawText('Z', fx, fy, C.zzz, 7 + i * 3);
    cx.globalAlpha = 1;
  }
}

function drawExclaim(x, y, t) {
  const bounce = Math.sin(t * 10) * 3;
  drawText('!', x, y + bounce, '#ff4444', 16);
}

// ========== ANIMATION ==========
let startTime=0, paused=false, pauseTime=0;
function restart(){ startTime=performance.now(); paused=false; requestAnimationFrame(loop); }
function togglePause(){
  if(paused){startTime+=performance.now()-pauseTime;paused=false;requestAnimationFrame(loop);}
  else{paused=true;pauseTime=performance.now();}
}
function loop(now){
  if(paused)return;
  let t=(now-startTime)/1000;
  if(t>6.5){restart();return;}
  t=Math.min(t,5);
  document.getElementById('ti').textContent=t.toFixed(2)+'s';
  render(t);
  requestAnimationFrame(loop);
}

function render(t) {
  rect(0,0,S,S,C.bg);

  // Dawn progress: realistic sunrise synced with wakeup
  // 0.0-1.0s: dawnP=0 (pitch black night, person sleeping)
  // 1.0-1.5s: dawnP=0-0.15 (still very dark, barely perceptible)
  // 1.5-2.5s: dawnP=0.15-0.5 (phone rings, sky starts to hint at blue on horizon)
  // 2.5-3.5s: dawnP=0.5-0.8 (person wakes, purple/pink horizon breaking)
  // 3.5-5.0s: dawnP=0.8-1.0 (full golden sunrise, text panel appears)
  const dawnP = t < 1.0 ? 0 : Math.min((t - 1.0) / 4.0, 1);

  drawRoom(dawnP);

  // Positions
  const bedX = 34, bedY = 100;
  const standX = 138, standY = 110;
  const phoneX = standX + 3, phoneY = standY - 20;

  // States
  const sleeping = t < 1.5;
  const ringing = t >= 1.5 && t < 2.5;
  const waking = t >= 2.5 && t < 3.5;
  const awake = t >= 3.5;

  // Blanket slide off: starts at 2.5, fully off by 3.2
  const blanketOff = t < 2.5 ? 0 : Math.min((t - 2.5) / 0.7, 1);
  // Sit up progress
  const sitUp = t < 2.5 ? 0 : Math.min((t - 2.5) / 0.8, 1);
  const sitUpEased = 1 - Math.pow(1 - sitUp, 3);

  // Draw bed
  drawBed(bedX, bedY);

  // Draw character
  if (t < 2.5) {
    // Sleeping
    const breathe = Math.sin(t * 1.5) * 1;
    drawSleepingHead(bedX, bedY, breathe);
    drawBlanket(bedX, bedY, 0);
    // ZZZ
    drawZzz(bedX + 40, bedY - 10, t);
  } else {
    // Waking up / awake
    drawBlanket(bedX, bedY, blanketOff);
    drawAwakeHead(bedX, bedY, sitUpEased);

    // Exclamation on wake
    if (t >= 2.5 && t < 3.2) {
      drawExclaim(bedX + 40, bedY - 26, t);
    }
  }

  // Nightstand + phone
  drawNightstand(standX, standY);
  drawPhone(phoneX, phoneY, ringing, ringing ? t : 0);

  // ========= [3.5–5.0] TEXT PANEL =========
  if (t >= 3.5) {
    const tt = t - 3.5;
    const pa = Math.min(tt / 0.25, 1);
    const pX = 16, pY = 172, pW = 224, pH = 76;

    cx.globalAlpha = pa * 0.92;
    rect(pX+3, pY+2, pW-6, pH-4, '#0a0a14');
    rect(pX+2, pY+3, pW-4, pH-6, '#0a0a14');

    cx.globalAlpha = pa * 0.75;
    rect(pX+4, pY, pW-8, 2, C.teal);
    rect(pX+4, pY+pH-2, pW-8, 2, C.teal);
    rect(pX, pY+4, 2, pH-8, C.teal);
    rect(pX+pW-2, pY+4, 2, pH-8, C.teal);
    rect(pX+2,pY+2,2,2,C.teal); rect(pX+pW-4,pY+2,2,2,C.teal);
    rect(pX+2,pY+pH-4,2,2,C.teal); rect(pX+pW-4,pY+pH-4,2,2,C.teal);
    cx.globalAlpha = pa * 0.15;
    rect(pX+6, pY+4, pW-12, 1, C.tealL);

    cx.globalAlpha = pa;
    const pcx = pX + pW / 2;

    drawText('ТЫ НЕ ВЫСПАЛСЯ?', pcx, pY + 16, C.teal, 11);

    if (tt > 0.15) { cx.globalAlpha = Math.min((tt-0.15)/0.1,1)*0.4; rect(pX+20,pY+26,pW-40,1,C.teal); }

    if (tt > 0.3) { cx.globalAlpha=Math.min((tt-0.3)/0.2,1); drawText('ПОПРОБУЙ ЗАВТРА', pcx, pY+39, C.yellow, 8); }

    if (tt > 0.4) { cx.globalAlpha = Math.min((tt-0.4)/0.1,1)*0.3; rect(pX+20,pY+48,pW-40,1,C.teal); }

    if (tt > 0.5) {
      cx.globalAlpha = Math.min((tt-0.5)/0.3,1)*0.7;
      drawText('СЛОЖНЫЕ ВОПРОСЫ', pcx, pY+58, C.tealL, 6);
      drawText('ВЕРНУТСЯ В РАЗМИНКЕ', pcx, pY+68, C.tealL, 6);
    }
    cx.globalAlpha = 1;
  }

  // Vignette
  const vg = cx.createRadialGradient(S/2,S/2-10,S*0.2,S/2,S/2,S*0.65);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.35)');
  cx.fillStyle=vg; cx.fillRect(0,0,S,S);
}

document.fonts.ready.then(()=>setTimeout(restart,200));
</script>
</body>
</html>
