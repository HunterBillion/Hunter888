# Hunter888 — Nginx reverse proxy (production)
# Handles HTTPS termination, WebSocket upgrade, security headers, rate limiting
#
# Certificates: Place fullchain.pem + privkey.pem in ./nginx/certs/
# Let's Encrypt: Use certbot standalone or DNS challenge before first run

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$req_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;  # Avatar uploads

    # ── Header buffers ───────────────────────────────────────────────
    # Default (4 8k) chokes on Next.js auth cookies + JWT + CSRF — nginx
    # rejects with 400 before proxying. Bump to accommodate modern SPAs.
    client_header_buffer_size 8k;
    large_client_header_buffers 8 64k;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Rate limiting ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Request ID (distributed tracing) ──────────────────────────────
    # Reuse incoming X-Request-ID or generate a new one
    map $http_x_request_id $req_id {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # ── Upstreams ────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
    }

    upstream web_frontend {
        server web:3000;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (for load balancers)
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # TLS certificates (mount from host or use certbot)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security Headers ────────────────────────────────────────
        # X-Frame-Options: prevent clickjacking (deny other sites iframing us)
        add_header X-Frame-Options "DENY" always;
        # X-Content-Type-Options: prevent MIME-type sniffing attacks
        add_header X-Content-Type-Options "nosniff" always;
        # X-XSS-Protection: legacy header, still accepted by older browsers
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer-Policy: don't leak query params/paths to third parties
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS: force HTTPS for 1 year + include subdomains + preload-ready
        # This stops downgrade attacks and fixes "Not Secure" in Chrome even
        # if a mixed-content reference slipped in.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Permissions-Policy: deny access to sensitive browser APIs by default
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(), usb=()" always;
        # CSP: the strongest XSS protection — controls which sources browser may
        # load scripts/styles/media from. Our frontend needs:
        #   - self (our own origin)
        #   - inline scripts/styles (Next.js hydration, Tailwind)
        #   - wss://x-hunter.expert for WebSockets
        #   - https://api.navy for LLM/embedding calls if any direct from browser (fallback)
        #   - https://accounts.google.com for OAuth redirects
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://x-hunter.expert https://api.navy https://accounts.google.com https://*.youtube.com https://*.youtu.be https://player.vimeo.com; frame-src 'self' https://www.youtube.com https://player.vimeo.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://accounts.google.com https://oauth.yandex.ru; upgrade-insecure-requests" always;

        # ── API routes ──────────────────────────────────────────────
        # NOTE: proxy_pass WITHOUT trailing slash preserves the /api/ prefix
        # which FastAPI expects (app.include_router(api_router, prefix="/api"))
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;

            # Timeouts for long LLM calls
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;

            # API responses must never be cached by browser/CDN
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # Auth endpoints — stricter rate limit
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # ── WebSocket routes ────────────────────────────────────────
        # NOTE: specific locations to ensure Upgrade headers are passed correctly
        location = /ws/training {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        location = /ws/pvp {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        location = /ws/notifications {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        location = /ws/knowledge {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        location = /ws/game-crm {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
        }

        # ── API responses: never cache (always fresh data) ─────────
        # (already handled above in /api/ location — but enforce here too
        # via location-specific headers to override any upstream defaults)

        # ── Next.js hashed static assets — cache forever ──────────
        # Filenames contain content hash (main-abc123.js), so a rebuild
        # generates a new URL and the old cached file becomes irrelevant.
        location /_next/static/ {
            proxy_pass http://web_frontend;
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ── Public assets (pixel sprites, sfx, images) — cache 1 day
        location ~* ^/(pixel|sfx|landing|sounds|animations)/ {
            proxy_pass http://web_frontend;
            expires 1d;
            add_header Cache-Control "public, max-age=86400" always;
        }

        # ── Favicons / manifest — cache 1 hour
        location ~* \.(ico|webmanifest|json)$ {
            proxy_pass http://web_frontend;
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
        }

        # ── Frontend HTML (Next.js pages) — NEVER cache ─────────────
        # The HTML always points to the latest hashed JS/CSS bundles.
        # If browser caches HTML, user stays on old version forever.
        # no-cache = must revalidate with server (ETag) before using cached copy.
        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTML pages must revalidate — hash-named assets cached forever
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
