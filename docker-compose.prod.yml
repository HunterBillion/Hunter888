# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires: .env.production (copy from .env.production.example)
#
# Key differences from base:
# - APP_DEBUG=false, production rate limits
# - Non-exposed ports for internal services (postgres, redis)
# - Read-only tmpfs where possible
# - Structured JSON logging
# - Nginx reverse proxy with HTTPS (optional, bring your own certs)
# - Automated DB backups via cron

services:
  postgres:
    # Don't expose port to host in production — only internal network
    ports: !reset []
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on

  redis:
    # Don't expose port to host in production
    ports: !reset []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 384mb
      # Journal #88 (class A): see docker-compose.yml for full rationale.
      # Security-critical keys (rate-limits, SETNX locks, blacklist) must
      # survive memory pressure — switch to volatile-lru so only TTL'd
      # cache entries are evicted.
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_FORMAT: json
      LOG_LEVEL: info
    # Don't expose API port directly — use nginx
    ports: !reset []
    # Graceful shutdown: gunicorn --graceful-timeout 30 + margin
    stop_grace_period: 45s
    # Security: read-only filesystem, allow writes only where needed
    read_only: true
    tmpfs:
      - /tmp:size=100M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      # IMPORTANT: prod override must re-declare args — otherwise Docker
      # Compose merges but loses env-substitution, falling back to Dockerfile
      # defaults (http://localhost:8000), which breaks HTTPS/prod domain and
      # triggers browser "Not Secure" mixed-content warning.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env.production}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL must be set in .env.production}
    # Don't expose web port directly — use nginx
    ports: !reset []
    read_only: true
    tmpfs:
      - /tmp:size=50M

  # ── Nginx Reverse Proxy (HTTPS termination) ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── DB Backup CronJob ──────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-trainer}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-trainer_db}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 3 * * * /backup-db.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
