# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires: .env.production (copy from .env.production.example)
#
# Key differences from base:
# - APP_DEBUG=false, production rate limits
# - Non-exposed ports for internal services (postgres, redis)
# - Read-only tmpfs where possible
# - Structured JSON logging
# - Nginx reverse proxy with HTTPS (optional, bring your own certs)
# - Automated DB backups via cron

services:
  postgres:
    # Don't expose port to host in production — only internal network
    ports: !reset []
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on

  redis:
    # Don't expose port to host in production
    ports: !reset []
    # Journal #88 (class A): volatile-lru — see docker-compose.yml for rationale.
    # Comments MUST stay outside `command: >` — # inside a folded YAML scalar
    # is part of the string, not a YAML comment, and breaks Redis CLI parsing.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 384mb
      --maxmemory-policy volatile-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
      args:
        RELEASE_SHA: ${RELEASE_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    # 2026-04-21 (journal #L8 — class A): override base env_file so prod
    # actually loads production secrets. Before this, docker-compose's
    # default `.env` in the compose dir was read, and edits to
    # `.env.production` silently had no effect. With this override,
    # .env.production is the single source of truth for prod runtime.
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_FORMAT: json
      LOG_LEVEL: info
      CORS_ORIGINS: https://x-hunter.expert,https://www.x-hunter.expert
      # Sprint 0 (2026-04-29) call humanisation — opt-in flags.
      # Master flag drives auto-opener + sentence-gate + max_tokens=300
      # for call/voice mode. Default OFF in code; this prod override
      # turns them ON for the pilot. Roll back without redeploy by
      # flipping CALL_HUMANIZED_V2 to "0" + `up -d --force-recreate api`.
      CALL_HUMANIZED_V2: "1"
      CALL_HUMANIZED_V2_AUTO_OPENER: "1"
      # P0.5 (2026-04-29): scrubber goes from observe-only ("warn") to
      # actually editing the AI text before TTS ("strip"). The phrase list
      # in ai_lexicon.py has had a couple of weeks of warn-mode logging in
      # prod; FP rate is acceptable. With strip, sentences starting with a
      # known AI-tell ("Безусловно", "Отличный вопрос", "Конечно", ...)
      # have the lead phrase removed before the audio is synthesised.
      CALL_HUMANIZED_V2_SCRUB_MODE: strip
      # P0.5 (2026-04-29): tighter output budget for call mode. 80 tokens
      # were producing replies up to ~13s of audio (field-observed in TTS
      # logs 2026-04-29). 60 tokens ≈ ~40 words ≈ 10-12s max — closer to
      # the natural phone-reply length. The arc prompt now also mandates
      # broken rhythm so the model is much less likely to ramble even at
      # the lower cap.
      CALL_HUMANIZED_V2_MAX_TOKENS: "60"
      # P0 (2026-04-29) Call Arc — decouple AI from manager script (PR #101).
      # Two-axis architecture: AI gets per-call role (CallArcStep), manager
      # sees stage tracker untouched. StageTracker keeps emitting stage.update
      # for /results scoring and the script panel — only AI prompt path
      # changes. Roll back by flipping CALL_ARC_V1 to "0" + restart api.
      CALL_ARC_V1: "1"
      CALL_ARC_INJECT_REALITY: "1"
      # P1 (2026-04-29) Coaching mistake detector — rule-based, no LLM.
      # Watches manager turns and emits coaching.mistake WS events
      # (monologue, no_open_question, early_pricing, repeated_argument,
      # talk_ratio_high). Backend-only — UI binding is P2. Roll back
      # by flipping to "0" + restart api.
      COACHING_MISTAKE_DETECTOR_V1: "1"
      # IL-1 (2026-04-30) Call filler audio — pre-LLM thinking sound
      # masks 1.7-4.7s of dead air. See PR #123. Roll back: flip "0" +
      # restart api. Required: CALL_HUMANIZED_V2=1 (already set above).
      CALL_FILLER_V1: "1"
      # IL-2 (2026-04-30) ElevenLabs streaming endpoint — see PR #128.
      # Switches /text-to-speech/{voice} → /stream + optimize_streaming_latency=3.
      # Quality identical (same model + voice settings); ~30-40% TTFB win.
      # Roll back: flip "0" + restart api.
      ELEVENLABS_STREAMING_ENABLED: "1"
      # IL-3 (2026-04-30) STT keyword priming — see PR #137. Whisper
      # initial_prompt biased toward bankruptcy/sales-call lexicon
      # (ФССП, 127-ФЗ, кредиторы, СберID...). Roll back: flip "0".
      STT_KEYWORD_PROMPT_ENABLED: "1"
      # (2026-05-01) Persona-aware call opener — see PR #140.
      # Replaces flat 5-phrase pool with (mood, age_bucket) bank.
      # Adds variable pickup delay (300-1800ms triangular per mood) so
      # the AI doesn't pick up at zero ms. Roll back: flip "0".
      CALL_OPENER_PERSONA_AWARE: "1"
      # (2026-05-01) Adaptive temperature 0.4-1.0 per emotion — see PR #144.
      # hostile=0.95, deal=0.55, hangup=0.40 (full table in llm.py).
      # Roll back: flip "0" + restart api.
      ADAPTIVE_TEMPERATURE_ENABLED: "1"
      # (2026-05-01) Low-risk flags from previous-agent's deploy plan —
      # both shipped + tested, off only because rollout was staged.
      #   * REVIEW_TTL_SCHEDULER_ENABLED — TZ-8 PR-E (#163): nightly
      #     auto-flip of `actual` → `needs_review` for stale chunks.
      #   * ARENA_EMBEDDING_LIVE_BACKFILL_ENABLED — Content→Arena PR-6
      #     (#146): live worker that backfills embeddings for new
      #     legal_knowledge_chunks instead of relying on nightly batch.
      # Both fail-closed (no behaviour change if subsystems break).
      REVIEW_TTL_SCHEDULER_ENABLED: "1"
      ARENA_EMBEDDING_LIVE_BACKFILL_ENABLED: "1"
    # Don't expose API port directly — use nginx
    ports: !reset []
    # Graceful shutdown: gunicorn --graceful-timeout 30 + margin
    stop_grace_period: 45s
    # Security: read-only filesystem, allow writes only where needed
    read_only: true
    tmpfs:
      - /tmp:size=100M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      # IMPORTANT: prod override must re-declare args — otherwise Docker
      # Compose merges but loses env-substitution, falling back to Dockerfile
      # defaults (http://localhost:8000), which breaks HTTPS/prod domain and
      # triggers browser "Not Secure" mixed-content warning.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set in .env.production}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL must be set in .env.production}
        NEXT_PUBLIC_RELEASE_SHA: ${RELEASE_SHA:-unknown}
    # Don't expose web port directly — use nginx
    ports: !reset []
    read_only: true
    tmpfs:
      - /tmp:size=50M

  # ── Nginx Reverse Proxy (HTTPS termination) ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    healthcheck:
      # Use 127.0.0.1 explicitly — `localhost` resolves to ::1 in this
      # image and nginx only listens on 0.0.0.0:80, so wget fails with
      # "Connection refused" → the container shows "unhealthy" forever
      # despite serving real traffic correctly.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── DB Backup CronJob ──────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-trainer}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-trainer_db}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 3 * * * /backup-db.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
